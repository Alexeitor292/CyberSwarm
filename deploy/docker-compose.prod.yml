name: cyberswarm

services:
  app:
    container_name: cyberswarm-app
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
        VITE_ADMIN_EMAILS: ${VITE_ADMIN_EMAILS}
    image: cyberswarm-app:prod
    restart: unless-stopped
    expose:
      - "8080"
    networks:
      - cyberswarm_net

  api:
    container_name: cyberswarm-api
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.api
    image: cyberswarm-api:prod
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      ADMIN_EMAILS: ${VITE_ADMIN_EMAILS}
      DATA_DIR: /data
      CALENDAR_FEED_URL: ${CALENDAR_FEED_URL:-}
      CALENDAR_PUBLIC_URL: ${CALENDAR_PUBLIC_URL:-}
      TEAM_INBOX_URL: ${TEAM_INBOX_URL:-}
      GOOGLE_WORKSPACE_DOMAIN: ${GOOGLE_WORKSPACE_DOMAIN:-cyberswarmsac.com}
      GOOGLE_WORKSPACE_ADMIN_CONSOLE_URL: ${GOOGLE_WORKSPACE_ADMIN_CONSOLE_URL:-https://admin.google.com/}
      GOOGLE_WORKSPACE_DRIVE_FOLDER_URL: ${GOOGLE_WORKSPACE_DRIVE_FOLDER_URL:-}
      GOOGLE_WORKSPACE_SHARED_DRIVE_URL: ${GOOGLE_WORKSPACE_SHARED_DRIVE_URL:-}
      GOOGLE_WORKSPACE_GROUP_EMAIL: ${GOOGLE_WORKSPACE_GROUP_EMAIL:-team@cyberswarmsac.com}
      GOOGLE_WORKSPACE_ORGANIZER_GROUP_EMAIL: ${GOOGLE_WORKSPACE_ORGANIZER_GROUP_EMAIL:-organizers@cyberswarmsac.com}
      GOOGLE_WORKSPACE_DELEGATED_ADMIN_EMAIL: ${GOOGLE_WORKSPACE_DELEGATED_ADMIN_EMAIL:-}
      GOOGLE_SERVICE_ACCOUNT_CLIENT_EMAIL: ${GOOGLE_SERVICE_ACCOUNT_CLIENT_EMAIL:-}
      GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY: ${GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY:-}
      GOOGLE_SERVICE_ACCOUNT_CREDENTIALS: ${GOOGLE_SERVICE_ACCOUNT_CREDENTIALS:-}
      GOOGLE_SERVICE_ACCOUNT_CREDENTIALS_BASE64: ${GOOGLE_SERVICE_ACCOUNT_CREDENTIALS_BASE64:-}
      GOOGLE_WORKSPACE_SCOPES: ${GOOGLE_WORKSPACE_SCOPES:-groups,calendar,gmail,forms,drive}
      ATTENDEE_SHARED_DRIVE_NAME: ${ATTENDEE_SHARED_DRIVE_NAME:-}
      ATTENDEE_SHARED_DRIVE_ID: ${ATTENDEE_SHARED_DRIVE_ID:-}
      ATTENDEE_SHEET_FILE_NAME: ${ATTENDEE_SHEET_FILE_NAME:-}
      ATTENDEE_SHEET_TAB_NAME: ${ATTENDEE_SHEET_TAB_NAME:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-CyberSwarm Team}
      SMTP_REPLY_TO: ${SMTP_REPLY_TO:-}
    volumes:
      - cyberswarm_data:/data
    networks:
      - cyberswarm_net

  reverse-proxy:
    container_name: cyberswarm-proxy
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
      - api
    ports:
      - "${REVERSE_PROXY_BIND:-127.0.0.1:8081}:80"
    volumes:
      - ./nginx/reverse-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - cyberswarm_net

  cloudflared:
    container_name: cyberswarm-tunnel
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      - reverse-proxy
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - cyberswarm_net
    profiles:
      - tunnel

networks:
  cyberswarm_net:
    name: cyberswarm-net

volumes:
  cyberswarm_data:
